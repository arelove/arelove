<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="400" height="200" rx="12" fill="url(#borderGrad)"/>
  <rect x="1.5" y="1.5" width="397" height="197" rx="11" fill="#0d1117"/>

  <ellipse cx="50" cy="40" rx="80" ry="50" fill="#ec4899" fill-opacity="0.04"/>
  <ellipse cx="370" cy="170" rx="70" ry="45" fill="#a855f7" fill-opacity="0.04"/>

  <rect x="20" y="18" width="36" height="36" rx="8" fill="#ec489918"/>
  <text x="38" y="42" font-size="18" text-anchor="middle" font-family="Segoe UI Emoji,Apple Color Emoji,sans-serif">🦀</text>

  <text x="64" y="33" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="url(#titleGrad)">wdk-safe</text>
  <text x="64" y="49" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#4a4a5a">rust · windows kernel · MIT / Apache-2.0</text>

  <rect x="20" y="63" width="360" height="0.75" fill="url(#dividerGrad)"/>

  <text y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">Safe </tspan><tspan fill="#e2e2e2" font-weight="600">Rust abstractions</tspan><tspan fill="#888"> for Windows kernel-mode</tspan></text>
  <text y="99" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">drivers. Encodes kernel invariants in the</tspan></text>
  <text y="116" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">type system — prevents </tspan><tspan fill="#ec4899" font-weight="600">BSODs at compile time</tspan><tspan fill="#888">.</tspan></text>

  <rect x="20" y="129" width="360" height="0.75" fill="url(#dividerGrad)"/>

  <rect x="20" y="140" width="46" height="20" rx="5" fill="#ce422b18"/>
  <rect x="20" y="140" width="46" height="20" rx="5" fill="none" stroke="#ce422b50" stroke-width="0.75"/>
  <text x="43" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#ce422b" text-anchor="middle">Rust</text>

  <rect x="74" y="140" width="102" height="20" rx="5" fill="#0078D618"/>
  <rect x="74" y="140" width="102" height="20" rx="5" fill="none" stroke="#0078D650" stroke-width="0.75"/>
  <text x="125" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#0078D6" text-anchor="middle">Windows Kernel</text>

  <rect x="184" y="140" width="88" height="20" rx="5" fill="#ec489918"/>
  <rect x="184" y="140" width="88" height="20" rx="5" fill="none" stroke="#ec489950" stroke-width="0.75"/>
  <text x="228" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#ec4899" text-anchor="middle">MIT / Apache-2.0</text>

  <text x="20" y="185" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="url(#arrowGrad)" font-weight="600">View on GitHub →</text>
