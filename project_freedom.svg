<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Border -->
  <rect width="400" height="200" rx="12" fill="url(#borderGrad)"/>
  <rect x="1.5" y="1.5" width="397" height="197" rx="11" fill="#0d1117"/>

  <!-- Glow -->
  <ellipse cx="50" cy="40" rx="80" ry="50" fill="#ec4899" fill-opacity="0.04"/>
  <ellipse cx="370" cy="170" rx="70" ry="45" fill="#a855f7" fill-opacity="0.04"/>

  <!-- Icon box -->
  <rect x="20" y="18" width="36" height="36" rx="8" fill="#ec489918"/>
  <text x="38" y="42" font-size="18" text-anchor="middle" font-family="Segoe UI Emoji,Apple Color Emoji,sans-serif">🚀</text>

  <!-- Title -->
  <text x="64" y="33" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="url(#titleGrad)">Freedom-Launcher</text>
  <text x="64" y="49" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#4a4a5a">game launcher · desktop app</text>

  <!-- Divider -->
  <rect x="20" y="63" width="360" height="0.75" fill="url(#dividerGrad)"/>

  <!-- Description -->
  <text y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">A </tspan><tspan fill="#e2e2e2" font-weight="600">lightweight game launcher</tspan><tspan fill="#888"> with built-in</tspan></text>
  <text y="99" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">torrent support and fully customizable UI.</tspan></text>
  <text y="116" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">Designed for performance and flexibility.</tspan></text>

  <!-- Divider 2 -->
  <rect x="20" y="129" width="360" height="0.75" fill="url(#dividerGrad)"/>

  <!-- Badges -->
  <rect x="20" y="140" width="68" height="20" rx="5" fill="#3776ab18"/>
  <rect x="20" y="140" width="68" height="20" rx="5" fill="none" stroke="#3776ab50" stroke-width="0.75"/>
  <text x="54" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#3776ab" text-anchor="middle">Python</text>

  <rect x="96" y="140" width="52" height="20" rx="5" fill="#24C8DB18"/>
  <rect x="96" y="140" width="52" height="20" rx="5" fill="none" stroke="#24C8DB50" stroke-width="0.75"/>
  <text x="122" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#24C8DB" text-anchor="middle">Tauri</text>

  <rect x="156" y="140" width="62" height="20" rx="5" fill="#ec489918"/>
  <rect x="156" y="140" width="62" height="20" rx="5" fill="none" stroke="#ec489950" stroke-width="0.75"/>
  <text x="187" y="154" font-family="'Segoe UI',system-ui,sans-serif" font-size="10.5" fill="#ec4899" text-anchor="middle">Desktop</text>

  <!-- View on GitHub link -->
  <text x="20" y="185" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="url(#arrowGrad)" font-weight="600">View on GitHub →</text>
</svg>
