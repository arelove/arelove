<svg width="500" height="334" viewBox="0 0 500 334" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gradient border -->
  <rect width="500" height="320" rx="12" fill="url(#borderGrad)"/>
  <!-- Inner bg -->
  <rect x="1.5" y="1.5" width="497" height="331" rx="11" fill="#0d1117"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="60" cy="40" rx="100" ry="60" fill="#ec4899" fill-opacity="0.035"/>
  <ellipse cx="460" cy="290" rx="90" ry="55" fill="#a855f7" fill-opacity="0.035"/>

  <!-- HEADER -->
  <rect x="22" y="20" width="34" height="34" rx="8" fill="#ec489918"/>
  <text x="39" y="43" font-size="17" text-anchor="middle" font-family="Segoe UI Emoji,Apple Color Emoji,sans-serif">💻</text>
  <text x="64" y="35" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="url(#titleGrad)">About Me</text>
  <text x="64" y="50" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#4a4a5a">full-stack developer · MIREA, Moscow</text>

  <!-- Divider 1 -->
  <rect x="22" y="63" width="456" height="0.75" fill="url(#dividerGrad)"/>

  <!-- BODY TEXT using tspan for proper inline flow -->
  <text y="83" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="22" fill="#888">I'm a </tspan><tspan fill="#ec4899" font-weight="600">full-stack developer</tspan><tspan fill="#888"> and student at </tspan><tspan fill="#a855f7" font-weight="600">MIREA</tspan><tspan fill="#888"> in Moscow.</tspan></text>

  <text y="101" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="22" fill="#888">Focused on </tspan><tspan fill="#ec4899" font-weight="600">React, TypeScript &amp; JavaScript</tspan><tspan fill="#888">, building</tspan></text>

  <text y="119" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="22" fill="#888">backends with </tspan><tspan fill="#a855f7" font-weight="600">Python, Rust, Django</tspan><tspan fill="#888"> and </tspan><tspan fill="#a855f7" font-weight="600">Flask</tspan><tspan fill="#888">.</tspan></text>

  <text y="141" font-family="'Segoe UI',system-ui,sans-serif" font-size="12"><tspan x="22" fill="#555">Transitioned from another career — started with HTML &amp; CSS, quickly fell</tspan></text>
  <text y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="12"><tspan x="22" fill="#555">in love with building dynamic apps. Every project is a chance to grow!</tspan></text>

  <!-- Divider 2 -->
  <rect x="22" y="170" width="456" height="0.75" fill="url(#dividerGrad)"/>

  <!-- BULLET 1 -->
  <rect x="22" y="181" width="456" height="30" rx="6" fill="#ec489906"/>
  <rect x="22" y="181" width="3" height="30" rx="1.5" fill="url(#barGrad)"/>
  <text y="201" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="36" fill="#999">Building cross-platform desktop apps with </tspan><tspan fill="#ec4899" font-weight="600">Tauri</tspan></text>

  <!-- BULLET 2 -->
  <rect x="22" y="217" width="456" height="30" rx="6" fill="#a855f706"/>
  <rect x="22" y="217" width="3" height="30" rx="1.5" fill="url(#barGrad)"/>
  <text y="237" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="36" fill="#999">Passionate about </tspan><tspan fill="#a855f7" font-weight="600">security &amp; encryption</tspan></text>

  <!-- BULLET 3 -->
  <rect x="22" y="253" width="456" height="30" rx="6" fill="#ec489906"/>
  <rect x="22" y="253" width="3" height="30" rx="1.5" fill="url(#barGrad)"/>
  <text y="273" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="36" fill="#999">Experimenting with </tspan><tspan fill="#ec4899" font-weight="600">AI &amp; voice assistants</tspan></text>

  <!-- BULLET 4 -->
  <rect x="22" y="289" width="456" height="30" rx="6" fill="#a855f706"/>
  <rect x="22" y="289" width="3" height="30" rx="1.5" fill="url(#barGrad)"/>
  <text y="309" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" xml:space="preserve"><tspan x="36" fill="#999">Always learning </tspan><tspan fill="#a855f7" font-weight="600">emerging technologies</tspan></text>

</svg>
