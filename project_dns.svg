  <text y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">Lightweight </tspan><tspan fill="#e2e2e2" font-weight="600">DNS switcher for Windows</tspan></text>
  <text y="99" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5"><tspan x="20" fill="#888">with system tray integration. Switch between</tspan></text>
